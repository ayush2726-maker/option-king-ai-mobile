name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-release-apk:
    name: Build standalone release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Inject weighted Gemini mobile UI
        run: python scripts/replace_app_js.py

      - name: Validate injected mobile source
        run: |
          grep -q "build 16" App.js
          grep -q "AI Decision Center" App.js
          grep -q "AI Score" App.js
          grep -q "Weighted" App.js

      - name: Generate app icons
        run: |
          python - <<'PY'
          import os, struct, zlib
          os.makedirs('assets', exist_ok=True)
          def chunk(kind, data):
              return struct.pack('>I', len(data)) + kind + data + struct.pack('>I', zlib.crc32(kind + data) & 0xFFFFFFFF)
          def png(path, size=1024):
              bg = bytes((7, 17, 31, 255))
              raw = b''.join(b'\x00' + bg * size for _ in range(size))
              data = b'\x89PNG\r\n\x1a\n'
              data += chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0))
              data += chunk(b'IDAT', zlib.compress(raw, 9))
              data += chunk(b'IEND', b'')
              with open(path, 'wb') as f:
                  f.write(data)
          for name in ('icon.png', 'adaptive-icon.png', 'adaptive-foreground.png'):
              png(os.path.join('assets', name))
          PY

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive
        env:
          EXPO_NO_TELEMETRY: "1"

      - name: Build standalone release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload standalone APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OptionKingAI-standalone-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
