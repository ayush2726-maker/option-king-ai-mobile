name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: build-apk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive
        env:
          EXPO_NO_TELEMETRY: "1"

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          BUILD=$(node -p "require('./app.json').expo.android.versionCode")
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            output/OKAI-TradeX-v${VERSION}-build${BUILD}.apk
          ls -lh output/
          echo "Built: OKAI-TradeX-v${VERSION}-build${BUILD}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OKAI-TradeX-v1.0.0-build25
          path: output/*.apk
          if-no-files-found: error
