name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: build-apk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive
        env:
          EXPO_NO_TELEMETRY: "1"

      - name: Bundle JS into APK
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
        env:
          NODE_ENV: production

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Sign APK with debug key
        run: |
          cd android
          jarsigner -verbose \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -keypass android \
            -signedjar app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            androiddebugkey || true
          # Fallback: use unsigned if signing fails
          ls app/build/outputs/apk/release/

      - name: Rename and collect APK
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          BUILD=$(node -p "require('./app.json').expo.android.versionCode")
          mkdir -p output
          # Try signed first, fallback to unsigned
          if [ -f android/app/build/outputs/apk/release/app-release-signed.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-signed.apk \
              output/OKAI-TradeX-v${VERSION}-build${BUILD}.apk
          else
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
              output/OKAI-TradeX-v${VERSION}-build${BUILD}.apk
          fi
          ls -lh output/
          echo "✅ APK ready: OKAI-TradeX-v${VERSION}-build${BUILD}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OKAI-TradeX-v1.0.0-build25
          path: output/*.apk
          if-no-files-found: error
