name: FINAL Release APK Bundled

on:
  workflow_dispatch:

concurrency:
  group: final-release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Check JS crash markers
        run: |
          ! grep -n "parseReport(report)" App.js
          ! grep -n "<<<<<<<\|=======\|>>>>>>>" App.js

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Bundle JS into APK assets
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed --eager --entry-file index.js --platform android --dev false --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          test -s android/app/src/main/assets/index.android.bundle
          ls -lh android/app/src/main/assets/index.android.bundle

      - name: Build RELEASE APK not debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Rename APK
        run: |
          APK=$(ls android/app/build/outputs/apk/release/*.apk | head -n 1)
          cp "$APK" "FINAL-OKAI-release-${{ github.run_number }}.apk"
          ls -lh "FINAL-OKAI-release-${{ github.run_number }}.apk"

      - name: Upload FINAL APK
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-OKAI-release-${{ github.run_number }}
          path: FINAL-OKAI-release-${{ github.run_number }}.apk
