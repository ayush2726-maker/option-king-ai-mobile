name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - App.js
      - app.json
      - package.json
      - package-lock.json
      - .github/workflows/android-apk.yml
      - .github/scripts/mobile_hotfix.py
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply verified mobile UI
        run: python3 .github/scripts/mobile_hotfix.py

      - name: Verify build 18 UI before APK
        run: |
          python3 -m py_compile .github/scripts/mobile_hotfix.py
          grep -q '1.0.0 build 18' App.js
          grep -q 'AI Decision Center' App.js
          grep -q 'AiDecisionCard status={status}' App.js
          grep -q 'infoScroll' App.js
          grep -q 'logScroll' App.js
          grep -q 'modeSwitchHeader' App.js
          grep -q 'PAPER SAFE' App.js
          grep -q 'mode === "MONTHLY" ? "MONTHLY" : mode' App.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        env:
          CI: true
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --clean --npm

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OptionKingAI-Mobile-build18-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
